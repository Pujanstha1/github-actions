name: Outputs Demo
on: workflow-dispatch
jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: Step One
              id: step1
              run: echo "version=0.0.1" >> $GITHUB_OUTPUT
            - name: Step Two 
              id: step2
              run: echo "type=STRING" >> $GITHUB_OUTPUT
              run: echo "The version is ${{ steps.step1.outputs.version }}"
            - name: Step Three
              run: echo "The type is ${{ steps.step2.outputs.type }}"